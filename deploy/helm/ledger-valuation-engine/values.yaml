replicaCount: 3

image:
  repository: ledger-valuation-engine
  tag: "0.1.0-SNAPSHOT"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

env:
  COCKROACH_HOST: cockroachdb
  COCKROACH_PORT: "26257"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  READ_MODEL_WARMUP: "true"
  SHARD_COUNT: "16"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
