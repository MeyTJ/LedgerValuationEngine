spring:
  application:
    name: LedgerValuationEngine
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${COCKROACH_HOST:localhost}:${COCKROACH_PORT:26257}/${COCKROACH_DB:ledger}?sslmode=disable
    username: ${COCKROACH_USER:root}
    password: ${COCKROACH_PASSWORD:}
    hikari:
      maximum-pool-size: 32
      transaction-isolation: TRANSACTION_SERIALIZABLE
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ledger-valuation-engine
      auto-offset-reset: earliest
      properties:
        isolation.level: read_committed
    listener:
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:4}

server:
  tomcat:
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}
    connection-timeout: 5s
    keep-alive-timeout: 30s
    max-keep-alive-requests: 1000
    threads:
      max: ${TOMCAT_MAX_THREADS:200}

ledger:
  ingress:
    topic: ${SIGNAL_INGRESS_TOPIC:signal-ingress}
    market-ticks-topic: ${NORMALIZED_MARKET_TICKS_TOPIC:NormalizedMarketTicks}
    market-ticks-group-id: ${NORMALIZED_MARKET_TICKS_GROUP_ID:ledger-valuation-market-ticks}
    market-ticks-concurrency: ${NORMALIZED_MARKET_TICKS_CONCURRENCY:4}
  readside:
    cache:
      max-entries: ${READ_CACHE_MAX_ENTRIES:100000}
      expire-after-write: ${READ_CACHE_TTL:PT1H}
    local-only: true
  tomcat:
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    com.ledger.valuation: INFO
