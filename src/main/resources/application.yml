spring:
  application:
    name: LedgerValuationEngine
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${COCKROACH_HOST:localhost}:${COCKROACH_PORT:26257}/${COCKROACH_DB:ledger}?sslmode=disable
    username: ${COCKROACH_USER:root}
    password: ${COCKROACH_PASSWORD:}
    hikari:
      maximum-pool-size: 32
      transaction-isolation: TRANSACTION_SERIALIZABLE
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ledger-valuation-engine
      auto-offset-reset: earliest
      properties:
        isolation.level: read_committed
    listener:
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:4}

server:
  shutdown: graceful
  tomcat:
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}
    connection-timeout: 5s
    keep-alive-timeout: 30s
    max-keep-alive-requests: 1000
    threads:
      max: ${TOMCAT_MAX_THREADS:200}

ledger:
  ingress:
    topic: ${SIGNAL_INGRESS_TOPIC:signal-ingress}
    market-ticks-topic: ${NORMALIZED_MARKET_TICKS_TOPIC:NormalizedMarketTicks}
    market-ticks-group-id: ${NORMALIZED_MARKET_TICKS_GROUP_ID:ledger-valuation-market-ticks}
    market-ticks-concurrency: ${NORMALIZED_MARKET_TICKS_CONCURRENCY:4}
    dlq-topic: ${NORMALIZED_MARKET_TICKS_DLQ:NormalizedMarketTicks.dlq}
  readside:
    cache:
      max-entries: ${READ_CACHE_MAX_ENTRIES:100000}
      expire-after-write: ${READ_CACHE_TTL:PT1H}
    local-only: ${READ_MODEL_LOCAL_ONLY:false}
    warmup-on-startup: ${READ_MODEL_WARMUP:true}
  tomcat:
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}
  outbox:
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    relay-interval-ms: ${OUTBOX_RELAY_INTERVAL_MS:500}
    relay-interval: ${OUTBOX_RELAY_INTERVAL:PT0.5S}
    max-retries: ${OUTBOX_MAX_RETRIES:10}
    claim-timeout: ${OUTBOX_CLAIM_TIMEOUT:PT5M}
  cockroach:
    retry:
      max-attempts: ${COCKROACH_RETRY_MAX:5}
      base-backoff-ms: ${COCKROACH_RETRY_BACKOFF_MS:25}
  reconciliation:
    interval-ms: ${RECONCILIATION_INTERVAL_MS:30000}
    interval: ${RECONCILIATION_INTERVAL:PT30S}
  accrual:
    enabled: ${ACCRUAL_ENABLED:false}
    cron: ${ACCRUAL_CRON:0 0 2 * * *}
    default-fee-minor-units: ${ACCRUAL_DEFAULT_FEE:100}
  sharding:
    shard-count: ${SHARD_COUNT:16}
  security:
    enabled: ${SECURITY_ENABLED:false}
  snapshot:
    enabled: ${SNAPSHOT_ENABLED:false}
    compaction-threshold: ${SNAPSHOT_THRESHOLD:1000}
    cron: ${SNAPSHOT_CRON:0 30 3 * * SUN}
  asof:
    cache:
      max-entries: ${ASOF_CACHE_MAX_ENTRIES:10000}
      expire-after-write: ${ASOF_CACHE_TTL:PT15M}
  audit:
    export:
      storage-path: ${AUDIT_EXPORT_PATH:./data/audit-exports}
      batch-size: ${AUDIT_EXPORT_BATCH_SIZE:10}
      worker-interval-ms: ${AUDIT_EXPORT_WORKER_INTERVAL_MS:5000}
      worker-interval: ${AUDIT_EXPORT_WORKER_INTERVAL:PT5S}
  stream:
    max-connections: ${SSE_MAX_CONNECTIONS:500}
  tenant:
    enforcement: ${TENANT_ENFORCEMENT:false}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ledger.valuation: INFO
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
